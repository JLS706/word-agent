# ──────────────────────────────────────────────────────
# DocMaster Agent — Docker Compose 多服务编排
# ──────────────────────────────────────────────────────
# 用一个命令同时启动 Agent 服务 + Sandbox 沙盒服务
#
# 启动: docker compose up
# 停止: docker compose down
# ──────────────────────────────────────────────────────

services:

  # ── 服务 1: Agent（主服务）──
  agent:
    build: .                           # 用根目录的 Dockerfile 构建
    ports:
      - "8000:8000"                    # 映射端口：宿主机 8000 → 容器 8000
    volumes:
      - ./config:/app/config           # 挂载配置文件（API Key）
    depends_on:
      - sandbox                        # 等 sandbox 先启动
    environment:
      - SANDBOX_URL=http://sandbox:8001  # 告诉 Agent 沙盒服务的地址
    #                  ↑
    # 注意：这里用的是 "sandbox"（服务名），不是 localhost
    # Docker Compose 会自动创建网络，各服务用服务名互相访问

  # ── 服务 2: Sandbox（沙盒微服务）──
  sandbox:
    build:
      context: .                         # 使用项目根目录作为构建上下文
      dockerfile: sandbox/Dockerfile     # 指定 Dockerfile 路径
    # 不映射端口到宿主机！只有 Agent 能访问，外部访问不了
    # 这就是安全隔离：用户 → Agent → Sandbox，用户不能直接调沙盒
    deploy:
      resources:
        limits:
          cpus: "1.0"                  # 最多用 1 个 CPU 核心
          memory: 256M                 # 最多用 256MB 内存
    # ↑ 资源限制：即使沙盒里的代码吃满 CPU/内存，也不影响 Agent 服务
